name: iOS Tests

# Runs on the same triggers as ci.yml so both must be green on every PR and
# push to main.  Also supports workflow_call so the deploy workflows can gate
# on it just like they gate on ci.yml.
#
# Two stages (fast-fail order):
#   1. iOS unit tests  (SOMIHomeTests)  — no backend required, ~2 min
#   2. iOS UI tests    (SOMIHomeUITests) — backend auto-started with embedded
#                                          MongoDB via `npm run start:e2e`
#
# To run locally:
#   ./scripts/test-ios-uitests.sh
#
# Required GitHub Secrets (optional — safe defaults used if absent):
#   E2E_JWT_ACCESS_SECRET   JWT signing key for the e2e server
#   E2E_JWT_REFRESH_SECRET  JWT refresh signing key for the e2e server

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  ios-tests:
    name: iOS Tests (unit + UI)
    runs-on: macos-15
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show environment
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep -E "iPhone 1[6-9]|iPhone 2" | head -10

      # ── Node / backend setup (needed for UI tests) ────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apps/somi-home-ios
        run: xcodegen generate

      # ── Stage 1: Unit tests (no backend) ─────────────────────────────────
      - name: iOS unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project apps/somi-home-ios/SOMIHome.xcodeproj \
            -scheme SOMIHome \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing SOMIHomeTests \
            -resultBundlePath TestResults/unit-tests.xcresult \
            | xcpretty --report junit --output TestResults/unit-tests.xml

      # ── Stage 2: UI tests (backend required) ─────────────────────────────
      # iOS Simulator on GitHub Actions CI cannot reach `localhost` because
      # macOS resolves it to ::1 (IPv6) while Node.js binds to 0.0.0.0
      # (IPv4 only), causing every TCP connection from the simulator to time
      # out.  The simulator CAN reach the host via its en0 LAN IP, so we
      # capture that IP here and pass it as API_BASE_URL to xcodebuild.
      - name: Get host LAN IP for simulator networking
        run: |
          HOST_IP=$(ipconfig getifaddr en0)
          echo "HOST_IP=$HOST_IP" >> $GITHUB_ENV
          echo "Simulator will reach backend at http://$HOST_IP:3000"

      - name: Start backend (embedded MongoDB)
        env:
          NODE_ENV: development
          JWT_ACCESS_SECRET: ${{ secrets.E2E_JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.E2E_JWT_REFRESH_SECRET }}
          TEST_SECRET: test-secret-dev
          PORT: '3000'
        run: nohup npm run start:e2e -w somi-connect > /tmp/backend.log 2>&1 &

      - name: Wait for backend
        run: |
          echo "Waiting for http://localhost:3000/healthz ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/healthz > /dev/null; then
              echo "Backend ready (${i}s)"; exit 0
            fi
            echo "  attempt $i/30..."
            sleep 1
          done
          echo "Backend did not become ready. Last log output:" >&2
          tail -50 /tmp/backend.log >&2
          exit 1

      - name: iOS UI tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project apps/somi-home-ios/SOMIHome.xcodeproj \
            -scheme SOMIHome \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing SOMIHomeUITests \
            -resultBundlePath TestResults/ui-tests.xcresult \
            API_BASE_URL="http://$HOST_IP:3000" \
            | xcpretty --report junit --output TestResults/ui-tests.xml

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-test-results-${{ github.run_number }}
          path: TestResults/
          retention-days: 14

      - name: Upload backend log (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: backend-log-${{ github.run_number }}
          path: /tmp/backend.log
          retention-days: 7
