name: Android Tests

# Runs on the same triggers as ci.yml so both must be green on every PR and
# push to main.  Also supports workflow_call so the deploy workflows can gate
# on it just like they gate on ci.yml and ios-uitests.yml.
#
# Two stages (fast-fail order):
#   1. Android unit tests        — JVM only, no emulator, ~2 min
#   2. Android instrumented tests — Compose UI tests via FakeApiService
#                                   (no backend required), ~10 min
#
# To run locally:
#   cd apps/somi-home-android
#   ./gradlew test                          # unit tests
#   ./gradlew connectedDebugAndroidTest     # instrumented tests (emulator must be running)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  android-tests:
    name: Android Tests (unit + instrumented)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Gradle wrapper execute permission
        run: chmod +x apps/somi-home-android/gradlew

      # ── Stage 1: Unit tests (JVM, no emulator) ───────────────────────────
      - name: Android unit tests
        working-directory: apps/somi-home-android
        run: ./gradlew :app:test --no-daemon

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-unit-test-results-${{ github.run_number }}
          path: apps/somi-home-android/app/build/reports/tests/
          retention-days: 14

      # ── Stage 2: Instrumented tests (emulator) ───────────────────────────
      # Uses FakeApiService via Hilt — no backend needed.
      - name: Enable KVM (hardware acceleration for emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Android instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          working-directory: apps/somi-home-android
          script: ./gradlew :app:connectedDebugAndroidTest --no-daemon

      - name: Upload instrumented test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-instrumented-test-results-${{ github.run_number }}
          path: apps/somi-home-android/app/build/reports/androidTests/
          retention-days: 14
