name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  somi-connect:
    name: somi-connect
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/somi-connect
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

  somi-clinic-web:
    name: somi-clinic-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/somi-clinic-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
