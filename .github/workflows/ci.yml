name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

jobs:
  somi-connect:
    name: somi-connect
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/somi-connect
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: somi-connect-dist
          path: services/somi-connect/dist/
          retention-days: 7

  somi-clinic-web:
    name: somi-clinic-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/somi-clinic-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: somi-clinic-web-dist
          path: apps/somi-clinic-web/dist/
          retention-days: 7

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: [somi-connect]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/somi-connect/Dockerfile
          push: false
          tags: somi-connect:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
